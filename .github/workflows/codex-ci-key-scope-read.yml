name: Codex CI key scope read probe

"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-ci-key-scope-read.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci-key-scope-read:
    runs-on: ubuntu-latest
    steps:
      - name: Probe CI application key read scope
        env:
          MERGIFY_TOKEN: ${{ secrets.MERGIFY_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${MERGIFY_TOKEN:-}" ]; then
            echo "MERGIFY_TOKEN secret is missing"
            exit 2
          fi

          base="https://api.mergify.com/v1"

          request() {
            label="$1"
            url="$2"
            tmp="$(mktemp)"
            status="$(curl -sS --max-time 25 -o "$tmp" -w '%{http_code}' \
              -H 'Accept: application/json' \
              -H "Authorization: Bearer ${MERGIFY_TOKEN}" \
              "$url" || true)"
            bytes="$(wc -c < "$tmp" | tr -d ' ')"
            sha="$(sha256sum "$tmp" | awk '{print $1}')"
            echo "=== ${label} ==="
            echo "url=${url}"
            echo "status=${status}"
            echo "bytes=${bytes}"
            echo "sha256=${sha}"
            if python3 -m json.tool "$tmp" 2>/dev/null | head -c 2500; then
              echo
            else
              head -c 2500 "$tmp" || true
              echo
            fi
            rm -f "$tmp"
            echo
          }

          request application_identity "${base}/application"
          request owner_repos_non_ci "${base}/repos/Nabeel-javed"
          request owner_stacks_recent_non_ci "${base}/repos/Nabeel-javed/stacks/recent"
          request owner_stacks_summary_non_ci "${base}/repos/Nabeel-javed/stacks/summary"
          request owner_default_products_adminish "${base}/default_products/Nabeel-javed"
          request owner_org_users_non_ci "${base}/orgs/Nabeel-javed/users"
          request owner_integrations_slack_non_ci "${base}/integrations/Nabeel-javed/configuration/slack"
          request owner_integrations_datadog_non_ci "${base}/integrations/Nabeel-javed/configuration/datadog"
          request ci_jobs_stats_allowed_control "${base}/ci/Nabeel-javed/jobs/stats"
          request ci_private_repo_quarantines_allowed_control "${base}/ci/Nabeel-javed/repositories/mergify-ci-leak-probe-1779042010/quarantines/stats"
