name: Codex badge privacy probe

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  badge-probe:
    if: contains(github.event.head_commit.message, '[run-badge-probe]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Probe unauthenticated badge endpoints
        run: |
          set -euo pipefail
          mkdir -p probe-results
          out="probe-results/badge-private-latest.txt"
          : > "$out"
          echo "run_id=${GITHUB_RUN_ID}" >> "$out"
          echo "commit=${GITHUB_SHA}" >> "$out"
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$out"
          echo >> "$out"

          probe() {
            label="$1"
            url="$2"
            tmp_body="$(mktemp)"
            tmp_headers="$(mktemp)"
            status="$(curl -sS --max-time 20 -D "$tmp_headers" -o "$tmp_body" -w '%{http_code}' "$url" || true)"
            echo "=== ${label} ===" >> "$out"
            echo "url=${url}" >> "$out"
            echo "status=${status}" >> "$out"
            echo "--- headers ---" >> "$out"
            sed -n '1,30p' "$tmp_headers" >> "$out"
            echo "--- body first 1200 bytes ---" >> "$out"
            head -c 1200 "$tmp_body" >> "$out" || true
            echo >> "$out"
            echo >> "$out"
            rm -f "$tmp_body" "$tmp_headers"
          }

          probe "private_badge_config" "https://api.mergify.com/v1/badges/Nabeel-javed/mergify-ci-probe-1775905336"
          probe "private_badge_content" "https://api.mergify.com/v1/badges/Nabeel-javed/mergify-ci-probe-1775905336/content"
          probe "private_badge_svg_redirect" "https://api.mergify.com/v1/badges/Nabeel-javed/mergify-ci-probe-1775905336.svg?style=flat"
          probe "public_badge_config" "https://api.mergify.com/v1/badges/Mergifyio/docs"
          probe "public_badge_content" "https://api.mergify.com/v1/badges/Mergifyio/docs/content"
          probe "nonexistent_badge_config" "https://api.mergify.com/v1/badges/codex-owner-does-not-exist-1775905336/codex-repo-does-not-exist"
          probe "nonexistent_badge_content" "https://api.mergify.com/v1/badges/codex-owner-does-not-exist-1775905336/codex-repo-does-not-exist/content"

      - name: Commit probe result
        run: |
          set -euo pipefail
          git config user.name "codex-probe"
          git config user.email "codex-probe@users.noreply.github.com"
          git add probe-results/badge-private-latest.txt
          git commit -m "Add badge privacy probe result" || exit 0
          git push
