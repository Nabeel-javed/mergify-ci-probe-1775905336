name: Codex CI token scope probe

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  ci-token-scope-probe:
    if: contains(github.event.head_commit.message, '[run-ci-scope-probe]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Probe CI token read boundaries
        env:
          MERGIFY_TOKEN: ${{ secrets.MERGIFY_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p probe-results
          out="probe-results/ci-token-scope-latest.txt"
          : > "$out"
          echo "run_id=${GITHUB_RUN_ID}" >> "$out"
          echo "commit=${GITHUB_SHA}" >> "$out"
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$out"
          echo >> "$out"

          if [ -z "${MERGIFY_TOKEN:-}" ]; then
            echo "MERGIFY_TOKEN secret is missing" >> "$out"
            exit 0
          fi

          probe() {
            label="$1"
            url="$2"
            tmp="$(mktemp)"
            status="$(curl -sS --max-time 25 -o "$tmp" -w '%{http_code}' \
              -H 'Accept: application/json' \
              -H "Authorization: Bearer ${MERGIFY_TOKEN}" \
              "$url" || true)"
            echo "=== ${label} ===" >> "$out"
            echo "url=${url}" >> "$out"
            echo "status=${status}" >> "$out"
            if python3 -m json.tool "$tmp" > /tmp/pretty-probe 2>/dev/null; then
              head -c 1600 /tmp/pretty-probe >> "$out"
            else
              head -c 1600 "$tmp" >> "$out" || true
            fi
            echo >> "$out"
            echo >> "$out"
            rm -f "$tmp"
          }

          base="https://api.mergify.com/v1"
          probe "application_identity" "${base}/application"
          probe "controlled_repo_logs" "${base}/repos/Nabeel-javed/mergify-ci-probe-1775905336/logs?per_page=1"
          probe "controlled_repo_users" "${base}/repos/Nabeel-javed/mergify-ci-probe-1775905336/users"
          probe "other_private_blog_logs" "${base}/repos/Nabeel-javed/blog/logs?per_page=1"
          probe "other_private_blog_users" "${base}/repos/Nabeel-javed/blog/users"
          probe "other_private_blog_pulls" "${base}/repos/Nabeel-javed/blog/pulls"
          probe "other_private_freelancing_logs" "${base}/repos/Nabeel-javed/freeLancing/logs?per_page=1"
          probe "other_private_portfolio_logs" "${base}/repos/Nabeel-javed/Portfolio/logs?per_page=1"
          probe "cross_owner_public_logs" "${base}/repos/Mergifyio/docs/logs?per_page=1"

      - name: Commit probe result
        run: |
          set -euo pipefail
          git config user.name "codex-probe"
          git config user.email "codex-probe@users.noreply.github.com"
          git add probe-results/ci-token-scope-latest.txt
          git commit -m "Add CI token scope probe result" || exit 0
          git push
