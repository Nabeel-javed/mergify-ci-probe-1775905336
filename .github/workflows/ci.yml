name: Continuous Integration

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests repeatedly for CI Insights
        env:
          MERGIFY_TOKEN: ${{ secrets.MERGIFY_TOKEN }}
          RUN_COUNT: 5
        run: |
          set +e
          failed=0
          for i in $(seq "$RUN_COUNT"); do
            echo "run=$i"
            pytest -q tests/
            exit_code=$?
            if [ $exit_code -ne 0 ]; then
              failed=1
            fi
          done
          exit $failed

  probe-github-token-against-mergify:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Probe Mergify with GITHUB_TOKEN
        env:
          GH_ACTIONS_TOKEN: ${{ github.token }}
        run: |
          set -eu

          probe() {
            label="$1"
            url="$2"
            tmp="$(mktemp)"
            status="$(curl -sS -o "$tmp" -w '%{http_code}' \
              -H "Authorization: Bearer $GH_ACTIONS_TOKEN" \
              "$url")"
            echo "=== $label ==="
            echo "status=$status"
            tr '\n' ' ' < "$tmp" | head -c 400
            echo
            rm -f "$tmp"
          }

          probe "application" "https://api.mergify.com/v1/application"
          probe "own_repo_scheduled_freeze" "https://api.mergify.com/v1/repos/Nabeel-javed/mergify-ci-probe-1775905336/scheduled_freeze"
          probe "cross_tenant_scheduled_freeze" "https://api.mergify.com/v1/repos/Mergifyio/mergify/scheduled_freeze"
