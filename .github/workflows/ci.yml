name: Continuous Integration

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests repeatedly for CI Insights
        env:
          MERGIFY_TOKEN: ${{ secrets.MERGIFY_TOKEN }}
          RUN_COUNT: 5
        run: |
          set +e
          failed=0
          for i in $(seq "$RUN_COUNT"); do
            echo "run=$i"
            pytest -q tests/
            exit_code=$?
            if [ $exit_code -ne 0 ]; then
              failed=1
            fi
          done
          exit $failed

  probe-github-token-against-mergify:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Probe Mergify with GITHUB_TOKEN
        env:
          GH_ACTIONS_TOKEN: ${{ github.token }}
        run: |
          set -eu

          probe() {
            label="$1"
            url="$2"
            tmp="$(mktemp)"
            status="$(curl -sS -o "$tmp" -w '%{http_code}' \
              -H "Authorization: Bearer $GH_ACTIONS_TOKEN" \
              "$url")"
            echo "=== $label ==="
            echo "status=$status"
            tr '\n' ' ' < "$tmp" | head -c 400
            echo
            rm -f "$tmp"
          }

          probe "application" "https://api.mergify.com/v1/application"
          probe "owner_repositories" "https://api.mergify.com/v1/repos/Nabeel-javed"
          probe "own_repo_pulls" "https://api.mergify.com/v1/repos/Nabeel-javed/mergify-ci-probe-1775905336/pulls"
          probe "own_ci_quarantines" "https://api.mergify.com/v1/ci/Nabeel-javed/repositories/mergify-ci-probe-1775905336/quarantines"
          probe "own_ci_jobs_count" "https://api.mergify.com/v1/ci/Nabeel-javed/jobs_count"
          probe "own_ci_flaky_context" "https://api.mergify.com/v1/ci/Nabeel-javed/repositories/mergify-ci-probe-1775905336/flaky-detection-context"
          probe "own_repo_scheduled_freeze" "https://api.mergify.com/v1/repos/Nabeel-javed/mergify-ci-probe-1775905336/scheduled_freeze"
          probe "cross_tenant_scheduled_freeze" "https://api.mergify.com/v1/repos/Mergifyio/mergify/scheduled_freeze"

  probe-mergify-scope-boundary:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Probe Mergify API with CI application key
        env:
          MERGIFY_TOKEN: ${{ secrets.MERGIFY_TOKEN }}
          OWNER: Nabeel-javed
          REPOSITORY: mergify-ci-probe-1775905336
        run: |
          set -euo pipefail

          if [ -z "${MERGIFY_TOKEN:-}" ]; then
            echo "MERGIFY_TOKEN secret is missing"
            exit 1
          fi

          base="https://api.mergify.com/v1"

          request() {
            method="$1"
            label="$2"
            path="$3"
            body="${4:-}"
            tmp="$(mktemp)"
            if [ -n "$body" ]; then
              status="$(curl -sS -o "$tmp" -w '%{http_code}' \
                -X "$method" \
                -H "Accept: application/json" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${MERGIFY_TOKEN}" \
                --data "$body" \
                "${base}${path}")"
            else
              status="$(curl -sS -o "$tmp" -w '%{http_code}' \
                -X "$method" \
                -H "Accept: application/json" \
                -H "Authorization: Bearer ${MERGIFY_TOKEN}" \
                "${base}${path}")"
            fi
            echo "=== ${label} ==="
            echo "method=${method}"
            echo "path=${path}"
            echo "status=${status}"
            if python3 -m json.tool "$tmp" > /tmp/mergify-probe-pretty 2>/dev/null; then
              head -c 2000 /tmp/mergify-probe-pretty
              echo
            else
              head -c 2000 "$tmp"
              echo
            fi
            rm -f "$tmp"
          }

          own="/repos/${OWNER}/${REPOSITORY}"
          other="/repos/Mergifyio/mergify"

          request GET "application_identity" "/application"
          request GET "own_logs" "${own}/logs?per_page=1"
          request GET "own_scheduled_freeze_list" "${own}/scheduled_freeze"
          request GET "own_queue_pause" "${own}/queue/pause"
          request GET "own_merge_queue_pause" "${own}/merge-queue/pause"
          request GET "owner_default_products" "/default_products/${OWNER}"
          request GET "cross_tenant_scheduled_freeze_list" "${other}/scheduled_freeze"
          request GET "cross_tenant_logs" "${other}/logs?per_page=1"

          freeze_body='{"reason":"scope-boundary-probe-delete-me","start":null,"end":null,"timezone":"UTC","matching_conditions":[],"exclude_conditions":[]}'
          request POST "own_scheduled_freeze_create" "${own}/scheduled_freeze" "$freeze_body"
          request GET "own_scheduled_freeze_list_after_create" "${own}/scheduled_freeze"

          request PUT "own_queue_pause_create" "${own}/queue/pause" '{"reason":"scope-boundary-probe-delete-me"}'
          request GET "own_queue_pause_after_create" "${own}/queue/pause"
          request DELETE "own_queue_pause_delete" "${own}/queue/pause"
          request GET "own_queue_pause_after_delete" "${own}/queue/pause"

          cleanup_tmp="$(mktemp)"
          curl -sS -o "$cleanup_tmp" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${MERGIFY_TOKEN}" \
            "${base}${own}/scheduled_freeze"
          jq -r '.scheduled_freezes[]? | select(.reason == "scope-boundary-probe-delete-me") | .id' "$cleanup_tmp" > /tmp/scope-boundary-freeze-ids
          rm -f "$cleanup_tmp"

          while IFS= read -r freeze_id; do
            [ -n "$freeze_id" ] || continue
            request DELETE "own_scheduled_freeze_cleanup_${freeze_id}" "${own}/scheduled_freeze/${freeze_id}" '{"delete_reason":"cleanup scope boundary probe"}'
          done < /tmp/scope-boundary-freeze-ids

          request GET "own_scheduled_freeze_list_after_cleanup" "${own}/scheduled_freeze"

  probe-mergify-ci-hidden-routes:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Probe dashboard-discovered CI routes with CI application key
        env:
          MERGIFY_TOKEN: ${{ secrets.MERGIFY_TOKEN }}
          OWNER: Nabeel-javed
          REPOSITORY: mergify-ci-probe-1775905336
        run: |
          set -euo pipefail

          if [ -z "${MERGIFY_TOKEN:-}" ]; then
            echo "MERGIFY_TOKEN secret is missing"
            exit 1
          fi

          base="https://api.mergify.com/v1"

          request() {
            label="$1"
            path="$2"
            tmp="$(mktemp)"
            status="$(curl -sS -o "$tmp" -w '%{http_code}' \
              -H "Accept: application/json" \
              -H "Authorization: Bearer ${MERGIFY_TOKEN}" \
              "${base}${path}")"
            echo "=== ${label} ==="
            echo "path=${path}"
            echo "status=${status}"
            if python3 -m json.tool "$tmp" > /tmp/mergify-ci-hidden-pretty 2>/dev/null; then
              head -c 2200 /tmp/mergify-ci-hidden-pretty
              echo
            else
              head -c 2200 "$tmp"
              echo
            fi
            rm -f "$tmp"
          }

          own_repo="/ci/${OWNER}/repositories/${REPOSITORY}"
          cross_repo="/ci/Mergifyio/repositories/mergify"

          request "application_identity" "/application"
          request "owner_repositories" "/repos/${OWNER}"
          request "owner_org_users" "/orgs/${OWNER}/users"
          request "own_repo_users" "/repos/${OWNER}/${REPOSITORY}/users"
          request "own_repo_config" "/repos/${OWNER}/${REPOSITORY}/config"

          request "ci_owner_jobs_count" "/ci/${OWNER}/jobs_count"
          request "ci_owner_jobs_names" "/ci/${OWNER}/jobs/names"
          request "ci_owner_jobs_branches" "/ci/${OWNER}/jobs/branches"
          request "ci_owner_jobs_runner_names" "/ci/${OWNER}/jobs/runner_names"
          request "ci_owner_jobs_runner_groups" "/ci/${OWNER}/jobs/runner_group_names"
          request "ci_owner_unhealthy_test_names" "/ci/${OWNER}/unhealthy-tests/test_names"
          request "ci_owner_retry_rules" "/ci/${OWNER}/retry_rule"
          request "ci_owner_runner_fleet_config" "/ci/${OWNER}/runners/fleet-config"
          request "owner_slack_integration_config" "/integrations/${OWNER}/configuration/slack"
          request "owner_datadog_integration_config" "/integrations/${OWNER}/configuration/datadog"

          request "own_quarantines" "${own_repo}/quarantines"
          request "own_quarantines_default_branch" "${own_repo}/quarantines/default-branch"
          request "own_quarantines_stats" "${own_repo}/quarantines/stats"
          request "own_auto_quarantine_config" "${own_repo}/auto-quarantine/config"
          request "own_flaky_detection_context" "${own_repo}/flaky-detection-context"
          request "own_tests_setup_status" "${own_repo}/tests-setup-status"
          request "own_new_tests" "${own_repo}/new-tests"
          request "own_unhealthy_tests" "${own_repo}/unhealthy-tests"

          request "cross_quarantines" "${cross_repo}/quarantines"
          request "cross_flaky_detection_context" "${cross_repo}/flaky-detection-context"
          request "cross_jobs_count" "/ci/Mergifyio/jobs_count"
          request "cross_runner_fleet_config" "/ci/Mergifyio/runners/fleet-config"

  probe-mergify-ci-ingestion-boundaries:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Probe CI ingestion-only routes with CI application key
        env:
          MERGIFY_TOKEN: ${{ secrets.MERGIFY_TOKEN }}
          OWNER: Nabeel-javed
          REPOSITORY: mergify-ci-probe-1775905336
        run: |
          set -euo pipefail

          if [ -z "${MERGIFY_TOKEN:-}" ]; then
            echo "MERGIFY_TOKEN secret is missing"
            exit 1
          fi

          request_json() {
            method="$1"
            label="$2"
            url="$3"
            body="$4"
            tmp="$(mktemp)"
            status="$(curl -sS -o "$tmp" -w '%{http_code}' \
              -X "$method" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${MERGIFY_TOKEN}" \
              --data "$body" \
              "$url")"
            echo "=== ${label} ==="
            echo "method=${method}"
            echo "url=${url}"
            echo "status=${status}"
            if python3 -m json.tool "$tmp" > /tmp/mergify-ci-ingest-pretty 2>/dev/null; then
              head -c 1200 /tmp/mergify-ci-ingest-pretty
              echo
            else
              head -c 1200 "$tmp"
              echo
            fi
            rm -f "$tmp"
          }

          request_proto() {
            label="$1"
            url="$2"
            tmp="$(mktemp)"
            status="$(curl -sS -o "$tmp" -w '%{http_code}' \
              -X POST \
              -H "Accept: application/json" \
              -H "Content-Type: application/x-protobuf" \
              -H "Authorization: Bearer ${MERGIFY_TOKEN}" \
              --data-binary @/dev/null \
              "$url")"
            echo "=== ${label} ==="
            echo "method=POST"
            echo "url=${url}"
            echo "status=${status}"
            head -c 1200 "$tmp"
            echo
            rm -f "$tmp"
          }

          request_buildkite() {
            label="$1"
            url="$2"
            tmp="$(mktemp)"
            status="$(curl -sS -o "$tmp" -w '%{http_code}' \
              -X POST \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -H "X-Buildkite-Event: ping" \
              -H "X-Buildkite-Token: ${MERGIFY_TOKEN}" \
              --data '{"event":"ping"}' \
              "$url")"
            echo "=== ${label} ==="
            echo "method=POST"
            echo "url=${url}"
            echo "status=${status}"
            if python3 -m json.tool "$tmp" > /tmp/mergify-ci-ingest-pretty 2>/dev/null; then
              head -c 1200 /tmp/mergify-ci-ingest-pretty
              echo
            else
              head -c 1200 "$tmp"
              echo
            fi
            rm -f "$tmp"
          }

          own_ci="https://api.mergify.com/v1/ci/${OWNER}/repositories/${REPOSITORY}"
          own_legacy="https://api.mergify.com/v1/repos/${OWNER}/${REPOSITORY}/ci"
          same_owner_missing_ci="https://api.mergify.com/v1/ci/${OWNER}/repositories/codex-mergify-missing-repo"
          same_owner_missing_legacy="https://api.mergify.com/v1/repos/${OWNER}/codex-mergify-missing-repo/ci"
          cross_ci="https://api.mergify.com/v1/ci/Mergifyio/repositories/mergify"
          cross_legacy="https://api.mergify.com/v1/repos/Mergifyio/mergify/ci"

          check_body='{"tests_names":["codex_probe_nonexistent_test"],"branch":"main"}'
          request_json POST "own_quarantine_check" "${own_ci}/quarantines/check" "$check_body"
          request_json POST "same_owner_missing_quarantine_check" "${same_owner_missing_ci}/quarantines/check" "$check_body"
          request_json POST "cross_quarantine_check" "${cross_ci}/quarantines/check" "$check_body"

          request_proto "own_trace_modern_empty_payload" "${own_ci}/traces"
          request_proto "own_trace_legacy_empty_payload" "${own_legacy}/traces"
          request_proto "same_owner_missing_trace_modern_empty_payload" "${same_owner_missing_ci}/traces"
          request_proto "same_owner_missing_trace_legacy_empty_payload" "${same_owner_missing_legacy}/traces"
          request_proto "cross_trace_modern_empty_payload" "${cross_ci}/traces"
          request_proto "cross_trace_legacy_empty_payload" "${cross_legacy}/traces"

          request_buildkite "own_buildkite_webhook_ping" "${own_ci}/buildkite/webhooks"
          request_buildkite "same_owner_missing_buildkite_webhook_ping" "${same_owner_missing_ci}/buildkite/webhooks"
          request_buildkite "cross_buildkite_webhook_ping" "${cross_ci}/buildkite/webhooks"

  probe-mergify-ci-quarantine-mutations:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Probe hidden quarantine mutations with CI application key
        env:
          MERGIFY_TOKEN: ${{ secrets.MERGIFY_TOKEN }}
          OWNER: Nabeel-javed
          REPOSITORY: mergify-ci-probe-1775905336
        run: |
          set -euo pipefail

          if [ -z "${MERGIFY_TOKEN:-}" ]; then
            echo "MERGIFY_TOKEN secret is missing"
            exit 1
          fi

          own_ci="https://api.mergify.com/v1/ci/${OWNER}/repositories/${REPOSITORY}"
          test_name="codex_ci_key_mutation_probe_${GITHUB_RUN_ID}"

          request_json() {
            method="$1"
            label="$2"
            url="$3"
            body="${4:-}"
            tmp="$(mktemp)"
            if [ -n "$body" ]; then
              status="$(curl -sS --max-time 25 -o "$tmp" -w '%{http_code}' \
                -X "$method" \
                -H "Accept: application/json" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${MERGIFY_TOKEN}" \
                --data "$body" \
                "$url" || true)"
            else
              status="$(curl -sS --max-time 25 -o "$tmp" -w '%{http_code}' \
                -X "$method" \
                -H "Accept: application/json" \
                -H "Authorization: Bearer ${MERGIFY_TOKEN}" \
                "$url" || true)"
            fi

            echo "=== ${label} ==="
            echo "method=${method}"
            echo "url=${url}"
            echo "status=${status}"
            if python3 -m json.tool "$tmp" 2>/dev/null | head -c 1600; then
              echo
            else
              head -c 1600 "$tmp" || true
              echo
            fi
            cp "$tmp" "${RUNNER_TEMP}/${label}.body"
            rm -f "$tmp"
            echo
          }

          request_json GET "quarantine_list_before" "${own_ci}/quarantines"

          create_body="$(TEST_NAME="${test_name}" python3 -c 'import json, os; print(json.dumps({"test_name": os.environ["TEST_NAME"], "reason": "codex authorized CI-key mutation probe; delete immediately"}))')"
          request_json POST "quarantine_create_with_ci_key" "${own_ci}/quarantines" "$create_body"

          quarantine_id="$(python3 -c 'import json, os; p=os.environ["RUNNER_TEMP"] + "/quarantine_create_with_ci_key.body"; print((json.load(open(p)).get("id", "")) if os.path.exists(p) else "")' 2>/dev/null || true)"

          request_json GET "quarantine_list_after_create" "${own_ci}/quarantines"

          if [ -n "$quarantine_id" ]; then
            request_json DELETE "quarantine_delete_with_ci_key" "${own_ci}/quarantines/${quarantine_id}"
          else
            echo "No quarantine id returned; skipping delete."
          fi

          request_json GET "quarantine_list_after_cleanup" "${own_ci}/quarantines"
          request_json PUT "flaky_detection_config_put_same_budget" "${own_ci}/flaky-detection-config" '{"budget_ratio_for_new_tests":0.1}'
